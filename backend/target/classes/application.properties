spring.application.name=trading-platform

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/trading_platform2
spring.datasource.username=postgres
spring.datasource.password=Prakash@b17
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=MySuperSecureJwtSecretKeyThatIsLongEnough1234568
jwt.expiration=8640000000

# Server Configuration
server.port=8080

# Logging
logging.level.com.trading=INFO
logging.level.org.springframework.security=WARN

# Scheduling
spring.task.scheduling.pool.size=5
